# deploy.yml — feat/github_action 머지 시 실행

# feat/github_action 브랜치에 push될 때 실행 (PR 머지 포함)
# terraform 또는 ansible 파일이 변경된 경우에만 실행

# 인프라가 처음 프로비저닝 되었을 경우 BE -> FE 순서로 deploy 진행. 
# 이 때 새로 생긴 bastion 서버 퍼블릭 IP와 SSH private 키 값을(필요하다면) 넘겨주기
# 인프라가 프로비저닝 된 상태에서 bastion, web 서버만 ansible을 다시 돌렸을 때, 
# var/www/html에서 기존 리액트 빌드 결과물이 있으면 그거 deploy, 아니면 기본 index.html deploy.

name: deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform_files/**"
      - "ansible_files/**"
      # - ".github/workflows/**"
    # paths-ignore:
    #   - '.github/workflows/destroy.yml'
 
jobs:
  # 어떤 파일이 바뀌었는지 감지 → 이후 job 실행 여부 결정
  # .steps — 같은 job 안의 이전 step 결과 참조
  changed-files:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      ansible: ${{ steps.filter.outputs.ansible }}
      # role별 변경 감지 output 추가
      role_common: ${{ steps.filter.outputs.role_common }}
      role_web: ${{ steps.filter.outputs.role_web }}
      role_was: ${{ steps.filter.outputs.role_was }}
      role_db: ${{ steps.filter.outputs.role_db }}
      role_bastion: ${{ steps.filter.outputs.role_bastion }}
      role_monitoring: ${{ steps.filter.outputs.role_monitoring }}
      role_logging: ${{ steps.filter.outputs.role_logging }}
      role_group_vars: ${{ steps.filter.outputs.role_group_vars }}
 
    steps:
      - uses: actions/checkout@v4
 
      # terraform_files, ansible_files 중 어느 쪽이 변경됐는지 판단
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform_files/**'
            ansible:
              - 'ansible_files/**'
            role_common:
              - 'ansible_files/roles/common/**'
              - 'ansible_files/group_vars/all.yml'
            role_web:
              - 'ansible_files/roles/web/**'
              - 'ansible_files/group_vars/web.yml'
            role_was:
              - 'ansible_files/roles/was/**'
              - 'ansible_files/group_vars/was.yml'
            role_db:
              - 'ansible_files/roles/db/**'
              - 'ansible_files/group_vars/db.yml'
            role_bastion:
              - 'ansible_files/roles/bastion/**'
              - 'ansible_files/group_vars/bastion.yml'
            role_monitoring:
              - 'ansible_files/roles/monitoring/**'
            role_logging:
              - 'ansible_files/roles/logging/**'
            role_group_vars:
              - 'ansible_files/group_vars/**'
              - 'ansible_files/site.yml'
              - 'ansible_files/requirements.yml'
 
  # terraform_files가 변경된 경우에만 실행
  terraform-apply:
    name: Terraform apply
    needs: changed-files
    if: needs.changed-files.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    environment: production  # GitHub environment 보호 규칙 적용 (수동 승인)
    defaults:
      run:
        working-directory: terraform_files
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false  # output 명령어 파싱 오류 방지
 
      # GitHub Secrets에 등록된 팀장님 AWS 키로 인증
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
 
      # S3 remote backend 연결 및 provider 초기화
      - name: Terraform init
        run: terraform init

      # 임시. 삭제할 것
      # - name: Terraform refresh      # 추가
      #   run: terraform refresh
 
      # plan.yml에서 저장한 tfplan artifact를 가져오기 위해 PR 번호 필요
      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(gh pr list --state merged --base feat/github_action \
            --json number,mergeCommit \
            --jq '.[] | select(.mergeCommit.oid == "${{ github.sha }}") | .number')
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      # PR 시점에 저장해둔 tfplan 바이너리 다운로드
      # retention-days 경과 등으로 artifact가 없어도 continue-on-error로 계속 진행
      - name: Download plan artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ steps.pr.outputs.number }}
          path: terraform_files/
        continue-on-error: true
 
      # artifact가 없을 때만 새로 plan 실행
      - name: Terraform plan (artifact 없을 때만 실행)
        if: steps.download.outcome == 'failure'
        run: terraform plan -out=tfplan
 
      # apply 완료 시 main.tf의 local_file 리소스가
      # inventory.yml, ansible.cfg를 ../ansible_files/에 자동 생성
      - name: Terraform apply
        run: terraform apply tfplan
      
        # inventory.yml, ansible.cfg를 실제 생성 확인
      - name: Check generated files
        run: |
          ls -la ./
      
      # apply 후 생성된 파일을 S3에 업로드
      # aws s3 cp terraform_files/ansible.cfg s3://fastforward-tfstate/ansible.cfg
      # aws s3 cp terraform_files/inventory.yml s3://fastforward-tfstate/inventory.yml
      - name: Upload ansible config to S3
        run: |
          aws s3 cp ansible.cfg s3://fastforward-tfstate/ansible.cfg
          aws s3 cp inventory.yml s3://fastforward-tfstate/inventory.yml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-2
      # ansible job은 별도 runner에서 실행되므로 파일을 artifact로 전달
      # artifact: GitHub Actions에서 job 간에 파일을 주고받기 위한 임시 파일 저장소
      # - name: Upload ansible files artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ansible-files
      #     # path: ansible_files/
      #     path: |
      #       ansible_files/inventory.yml
      #       ansible_files/ansible.cfg
      #     retention-days: 1
 
  # terraform 또는 ansible 파일이 변경된 경우 실행
  # terraform이 바뀌면 인프라가 새로 뜨므로 ansible도 항상 같이 실행
  ansible-configure:
    name: Ansible configure
    needs: [changed-files, terraform-apply]
    # always() && !failure() : changed-files, terraform-apply가 skip된 건 괜찮고, 실패한 건 막자
    if: |
      always() &&
      !failure() &&
      (needs.changed-files.outputs.ansible == 'true' ||
       needs.changed-files.outputs.terraform == 'true')
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4

      # S3에서 최신 파일 다운로드
      - name: Download ansible config from S3
        run: |
          aws s3 cp s3://fastforward-tfstate/ansible.cfg ansible_files/ansible.cfg
          aws s3 cp s3://fastforward-tfstate/inventory.yml ansible_files/inventory.yml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-2
 
      # terraform job에서 생성된 inventory.yml, ansible.cfg 수신
      # - name: Download ansible files artifact
      #   if: needs.changed-files.outputs.terraform == 'true'
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: ansible-files
      #     path: ansible_files/
 
      # GitHub Secrets의 SSH_PRIVATE_KEY로 키 파일 생성
      # bastion 및 ProxyCommand 경유 서버 접속에 사용
      # 공개키는 미리 aws_key_pair에 등록되어있어야 한다
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
 
      - name: Install ansible
        run: pip install ansible --break-system-packages

      # requirements.yml에 정의된 role 설치
      - name: Install ansible requirements
        working-directory: ansible_files
        run: |
          ansible-galaxy install -r requirements.yml -p ~/.ansible/roles
          ansible-galaxy collection install prometheus.prometheus
          ansible-galaxy collection install grafana.grafana

      # 수정된 roles를 식별하기 위한 환경 변수 생성
      # 전체 실행해야 하는지 먼저 체크 후
      # 전체 실행이 아니면 변경된 role만 태그 누적
      # .needs — 다른 job의 결과 참조
      - name: Build ansible tags
        id: tags
        run: |
          needs='${{ toJSON(needs.changed-files.outputs) }}'

          # terraform 변경 또는 site.yml/requirements.yml/group_vars 전체 변경이면 전체 실행
          if [ "${{ needs.changed-files.outputs.terraform }}" == "true" ] || \
             [ "${{ needs.changed-files.outputs.role_group_vars }}" == "true" ]; then
            echo "RUN_ALL=true" >> $GITHUB_OUTPUT
            echo "→ 전체 실행 (terraform 변경 또는 공통 설정 변경)"
          else
            TAGS=""
            [ "${{ needs.changed-files.outputs.role_common }}"     == "true" ] && TAGS="$TAGS,common"
            [ "${{ needs.changed-files.outputs.role_web }}"        == "true" ] && TAGS="$TAGS,web"
            [ "${{ needs.changed-files.outputs.role_was }}"        == "true" ] && TAGS="$TAGS,was"
            [ "${{ needs.changed-files.outputs.role_db }}"         == "true" ] && TAGS="$TAGS,db"
            [ "${{ needs.changed-files.outputs.role_bastion }}"    == "true" ] && TAGS="$TAGS,bastion"
            [ "${{ needs.changed-files.outputs.role_monitoring }}" == "true" ] && TAGS="$TAGS,monitoring"
            [ "${{ needs.changed-files.outputs.role_logging }}"    == "true" ] && TAGS="$TAGS,logging"
            TAGS="${TAGS#,}"  # 앞의 쉼표 제거
            echo "TAGS=$TAGS" >> $GITHUB_OUTPUT
            echo "→ 부분 실행 tags: $TAGS"
          fi

        # terraform 변경, role_group_vars 변경
      - name: Run Ansible (전체)
        if: steps.tags.outputs.RUN_ALL == 'true'
        working-directory: ansible_files
        run: ansible-playbook -i ./inventory.yml site.yml
        
        # Ansible은 --tags에 OR 조건으로 매칭되는 모든 role을 실행
      - name: Run Ansible (부분)
        if: steps.tags.outputs.RUN_ALL != 'true' && steps.tags.outputs.TAGS != ''
        working-directory: ansible_files
        run: ansible-playbook -i ./inventory.yml site.yml --tags "${{ steps.tags.outputs.TAGS }}"

      - name: Skip (변경 없음)
        if: steps.tags.outputs.RUN_ALL != 'true' && steps.tags.outputs.TAGS == ''
        run: echo "ansible_files 변경 없음, Ansible 실행 스킵"
        
# Terraform이 새로 프로비저닝됐을 때만 BE -> FE 순서로 배포 트리거
  trigger-app-deployments:
    name: Trigger BE and FE deployments
    needs: [changed-files, ansible-configure]
    # Terraform이 실행됐을 때(새 프로비저닝)만 실행
    if: |
      always() &&
      !failure() &&
      needs.changed-files.outputs.terraform == 'true'
    runs-on: ubuntu-latest
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Download inventory from S3
        run: |
          aws s3 cp s3://fastforward-tfstate/inventory.yml ./inventory.yml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-2
 
      # inventory.yml에서 Bastion Public IP 파싱
      # ansible_host: "1.2.3.4" 형태에서 bastion 섹션의 첫번째 IP를 가져옴
      - name: Get Bastion IP from inventory
        id: get_bastion_ip
        run: |
          BASTION_IP=$(grep -A3 'bastion:' inventory.yml | grep 'ansible_host' | head -1 | awk '{print $2}' | tr -d '"')
          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "→ Bastion IP: $BASTION_IP"
 
      # BE 먼저 배포 (DB 연결 등 백엔드가 먼저 떠야 FE가 정상 동작)
      - name: Trigger BE deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: 'fast-forward-BE',
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                bastion_host: '${{ steps.get_bastion_ip.outputs.bastion_ip }}'
              }
            })
            console.log('BE deployment triggered with Bastion IP: ${{ steps.get_bastion_ip.outputs.bastion_ip }}')
 
      # BE 배포가 어느 정도 진행된 후 FE 배포 트리거 (60초 대기)
      - name: Wait for BE deployment to start
        run: |
          echo "BE 배포 시작 대기 중... (60초)"
          sleep 60
 
      # FE 배포
      - name: Trigger FE deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: 'fast-forward-FE',
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                bastion_host: '${{ steps.get_bastion_ip.outputs.bastion_ip }}'
              }
            })
            console.log('FE deployment triggered with Bastion IP: ${{ steps.get_bastion_ip.outputs.bastion_ip }}')

      # - name: Run Ansible
      #   working-directory: ansible_files
      #   run: |
      #     ansible-playbook -i ./inventory.yml site.yml
 
      # terraform이 생성한 inventory.yml로 대상 서버 지정
      # ansible.cfg의 ProxyCommand로 bastion 경유 접속
      # - name: Run playbook
      #   working-directory: ansible_files
      #   run: |
      #     ansible-playbook -i inventory.yml site.yml \
      #       --private-key ~/.ssh/id_rsa

