[defaults]
inventory = ./inventory.yml
host_key_checking = False
private_key_file= ~/Fast-forward-INFRA/terraform_files/FF-test-key.pem
retry_files_enabled = False
roles_path = ~/.ansible/roles:./roles

[ssh_connection]
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root