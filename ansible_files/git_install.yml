---
- name: Install
  hosts: localhost
  become: yes
  vars:
    name: "dajeong"
    email: "rush7993@gmail.com"
  tasks:
    - name: 1. Install Git
      yum:
        name: git
        state: present

    - name: 2. user name
      git_config:
        name: user.name
        scope: global
        value: "{{name}}"

    - name: 3. user email
      git_config:
        name: user.email
        scope: global
        value: "{{email}}"