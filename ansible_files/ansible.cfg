[defaults]
inventory = ./inventory.ini
host_key_checking = False
remote_user=ansible_3tier
private_key_file=/home/ansible/.ssh/team-test-key-3tier.pem
retry_files_enabled = False
roles_path = ./roles:/home/ansible/.ansible/roles

[ssh_connection]
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root