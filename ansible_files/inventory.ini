[web]
web1 ansible_host=54.180.81.61
# web1: nginx 역할 수행 (reverse proxy)

[was]
was1 ansible_host=54.180.81.61
# was1: FastAPI 애플리케이션 실행
# python venv + uvicorn 기반 서비스

[db]
db1 ansible_host=54.180.81.61
# db1: PostgreSQL 데이터베이스 서버

[mgmt]
mgmt ansible_connection=local
# mgmt: Ansible 실행 서버 (Bastion 역할)
# 현재는 동일 인스턴스에서 local 실행

[localhost]
localhost ansible_connection=local

[logging]
mgmt
web1
was1
# logging role 적용 대상:
# - localhost (mgmt) → 중앙 로그 수집/관리
# - web1 → nginx access/error 로그 수집
# - was1 → FastAPI 애플리케이션 로그 수집
# ※ db는 로그 수집 대상에서 제외

[all:vars]
ansible_user=ansible_3tier
ansible_ssh_private_key_file=/home/ansible/.ssh/team-test-key-3tier.pem