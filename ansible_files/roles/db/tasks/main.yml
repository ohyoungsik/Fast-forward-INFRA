---
- name: install postgresql
  include_role:
    name: geerlingguy.postgresql

- name: create db
  become_user: postgres
  postgresql_db:
    name: "{{ postgres_db }}"

- name: create user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
    role_attr_flags: "LOGIN"

- name: grant database privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: database
    privs: CONNECT,CREATE,TEMPORARY

- name: grant schema privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: schema
    objs: public
    privs: USAGE,CREATE

- name: grant table privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
    privs: SELECT,INSERT,UPDATE,DELETE

- name: grant sequence privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: sequence
    objs: ALL_IN_SCHEMA
    schema: public
    privs: USAGE,SELECT,UPDATE

- name: alter default table privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: default_privs
    objs: TABLES
    schema: public
    privs: SELECT,INSERT,UPDATE,DELETE

- name: alter default sequence privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: default_privs
    objs: SEQUENCES
    schema: public
    privs: USAGE,SELECT,UPDATE

- name: allow postgresql listen on all interfaces
  lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '*'"
  become: yes
  notify: restart postgresql

- name: allow fastapi server to connect postgresql
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    regexp: "^host\\s+{{ postgres_db }}\\s+{{ postgres_user }}\\s+172\\.16\\.20\\.20/24"
    line: "host    {{ postgres_db }}    {{ postgres_user }}    172.16.20.20/24    scram-sha-256"
    state: present
  become: yes
  notify: restart postgresql

- name: install unzip and curl
  apt:
    name:
      - unzip
      - curl
    state: present
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: install awscli v2
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
    unzip -o /tmp/awscliv2.zip -d /tmp/
    /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws
  become: yes

- name: copy s3 environment variables file
  copy:
    src: s3_env.sh
    dest: /root/s3_env.sh
    mode: "0644"
  become: yes

- name: copy db backup script
  copy:
    src: db_backup.sh
    dest: /root/db_backup.sh
    mode: "0755"
  become: yes

- name: register db backup cron job
  cron:
    name: "Daily PostgreSQL S3 Backup"
    minute: "0"
    hour: "3"
    job: "DB_USER={{ postgres_user }} DB_NAME={{ postgres_db }} PGPASSWORD={{ postgres_password }} /root/db_backup.sh >> /var/log/db_backup.log 2>&1"
    user: root
  become: yes

- name: apply postgresql restart immediately
  meta: flush_handlers