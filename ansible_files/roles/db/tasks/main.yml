---
- name: install postgresql
  include_role:
    name: geerlingguy.postgresql
    # - PostgreSQL을 직접 apt로 설치하지 않고 Galaxy Role 사용

- name: create db
  become_user: postgres
  postgresql_db:
    name: "{{ postgres_db }}"
    # - 애플리케이션에서 사용할 DB 생성

- name: create user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
    role_attr_flags: "LOGIN"
    # - 애플리케이션(DB 접속용) 계정 생성
    # - SUPERUSER 권한은 부여하지 않음

- name: DEBUG postgres role is running @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@ create user FFF
  debug:
    msg: "PostgreSQL role is running on {{ inventory_hostname }}"

- name: grant database privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: database
    privs: CONNECT,CREATE,TEMPORARY
    # - DB 연결 및 기본 생성 권한 부여

- name: grant schema privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: schema
    objs: public
    privs: USAGE,CREATE
    # - public schema 사용 및 테이블 생성 권한

- name: grant table privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
    privs: SELECT,INSERT,UPDATE,DELETE
    # - 테이블 CRUD 권한

- name: grant sequence privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: sequence
    objs: ALL_IN_SCHEMA
    schema: public
    privs: USAGE,SELECT,UPDATE
    # - SERIAL / BIGSERIAL sequence 사용 권한

- name: alter default table privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: default_privs
    objs: TABLES
    schema: public
    privs: SELECT,INSERT,UPDATE,DELETE
    # - 이후 생성되는 테이블에도 기본 권한 자동 적용

- name: alter default sequence privileges
  become_user: postgres
  postgresql_privs:
    db: "{{ postgres_db }}"
    role: "{{ postgres_user }}"
    type: default_privs
    objs: SEQUENCES
    schema: public
    privs: USAGE,SELECT,UPDATE
    # - 이후 생성되는 sequence에도 기본 권한 자동 적용\

- name: allow postgresql listen on all interfaces
  lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '*'"
  become: yes
  notify: restart postgresql
  # - 외부(FastAPI 서버) 접근 허용

- name: allow fastapi server to connect postgresql
  lineinfile:
    path: /etc/postgresql/16/main/pg_hba.conf
    regexp: "^host\\s+{{ postgres_db }}\\s+{{ postgres_user }}\\s+172\\.16\\.20\\.20/24"
    line: "host    {{ postgres_db }}    {{ postgres_user }}    172.16.20.20/24    scram-sha-256"
    state: present
  become: yes
  notify: restart postgresql
  # - FastAPI 서버 IP 접근 허용

- name: fastapi server to connect postgresql !!!!!!!!!!!!!!!!!!!!!! end before
  debug:
    msg: "PostgreSQL role is running on {{ inventory_hostname }}"

- name: copy db backup script
  copy:
    src: db_backup.sh
    dest: /root/db_backup.sh
    mode: '0755'
  become: yes
  # - 백업 스크립트를 DB 서버로 복사 및 실행 권한(0755) 부여

- name: register db backup cron job
  cron:
    name: "Daily PostgreSQL S3 Backup"
    minute: "0"
    hour: "3"
    job: "/root/db_backup.sh >> /var/log/db_backup.log 2>&1"
    user: root
  become: yes
  # - 매일 새벽 3시 백업 스크립트 실행
  # - 실행 결과 및 에러를 /var/log/db_backup.log 로 기록

- name: apply postgresql restart immediately
  meta: flush_handlers