---
# Nginx 설치 및 Reverse Proxy 설정#
- name: install nginx via galaxy
  include_role:
    name: geerlingguy.nginx

- name: "1. 패키지 설치"
  apt:
    name:
      - certbot
      - python3-certbot-nginx
      - cron
    state: present
    update_cache: yes

- name: "web root directory 생성"
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: check if react build exists
  stat:
    path: /var/www/html/index.html
  register: react_build
 
- name: deploy default nginx index.html (only if react build does not exist)
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  when: not react_build.stat.exists
  
# - name: "bastion index.html 배포"
#   template:
#     src: index.html.j2
#     dest: /var/www/html/index.html
#     owner: www-data
#     group: www-data
#     mode: '0644'

- name: "bastion nginx reverse proxy config 배포"
  template:
    src: bastion-proxy.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: restart nginx

  # ── 2단계: HTTPS 설정 (신규 추가) ────────────────────────────────
- name: "1. 패키지 설치"
  apt:
    name:
      - certbot
      - python3-certbot-nginx
      - cron
    state: present
    update_cache: yes

- name: "2. Nginx 사이트 활성화 확인"
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  notify: Reload nginx

- name: "3. certbot 실행 전 Nginx 즉시 reload"
  meta: flush_handlers

- name: "4. Let's Encrypt 인증서 발급"
  command: >
    certbot --nginx --non-interactive --agree-tos
    -m {{ certbot_email }}
    -d {{ domain_name }}
    -d www.{{ domain_name }}
  args:
    creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem

- name: "5. cron 시작 및 자동 실행"
  systemd:
    name: cron
    state: started
    enabled: yes

- name: "6. 자동 갱신 크론 등록"
  cron:
    name: "Certbot Auto Renew"
    minute: "{{ certbot_renew_minute }}"
    hour: "{{ certbot_renew_hour }}"
    user: root
    job: "/usr/bin/certbot renew --quiet && systemctl reload nginx"

# Prometheus 설치 (collection)
- name: "prometheus 설치"
  include_role:
    name: prometheus.prometheus.prometheus
  vars:
    prometheus_version: "2.47.0"

- name: "플랫폼 정보 수집"
  ansible.builtin.setup:
    gather_subset: min

- name: "필수 패키지 설치(Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - wget
      - gnupg2
    state: present
    update_cache: yes

- name: Grafana GPG 키 다운로드
  get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /tmp/grafana.key   # ✅ 여기 중요
    mode: '0644'

- name: 기존 keyring 제거 (중요🔥)
  file:
    path: /usr/share/keyrings/grafana.gpg
    state: absent

- name: Grafana GPG key 변환 (dearmor)
  command: gpg --dearmor -o /usr/share/keyrings/grafana.gpg /tmp/grafana.key
  
- name: Grafana repo 추가
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
    state: present

- name: "Grafana 설치 (Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: yes

- name: "Grafana 서비스 시작 및 부팅 시 자동실행"
  ansible.builtin.systemd:
    name: grafana-server
    state: started
    enabled: yes

  # 설명: 그라파나가 알림 설정 파일을 읽을 수 있도록 '/etc/grafana/provisioning/alerting' 폴더를 미리 생성해 두는 안전장치입니다.
- name: Create Grafana alerting provisioning directory
  file:
    path: /etc/grafana/provisioning/alerting
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  become: yes

- name: alerting config file copy (연락처 설정)
  copy:
    src: alerting.yml
    dest: /etc/grafana/provisioning/alerting/alerting.yml
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  # 설명: 우리가 'roles/bastion/files/' 폴더에 만들어둘 alerting.yaml (텔레그램 봇 토큰과 채팅방 ID 설정) 파일을 서버로 복사합니다. 복사 후 그라파나를 재시작하도록 알림(notify)을 보냅니다.

- name: alert rules config file copy (알림 규칙 설정)
  copy:
    src: rules.yml
    dest: /etc/grafana/provisioning/alerting/rules.yml
    owner: grafana
    group: grafana
    mode: '0644'
  become: yes
  notify: restart grafana
  # 설명: 우리가 추출할 rules.yaml (CPU, RAM, 디스크 트래픽 임계치 설정) 파일을 서버로 복사합니다.
