- name: "Grafana 설치 (Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: yes

- name: "Grafana 서비스 시작 및 부팅 시 자동실행"
  ansible.builtin.systemd:
    name: grafana-server
    state: started
    enabled: yes

