---
- name: install nginx via galaxy
  include_role:
    name: geerlingguy.nginx

- name: create web root directory
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: check if react build exists
  stat:
    path: /var/www/html/index.html
  register: react_build
 
- name: deploy default nginx index.html (only if react build does not exist)
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  when: not react_build.stat.exists
# - name: deploy private nginx index.html
#   template:
#     src: index.html.j2
#     dest: /var/www/html/index.html
#     owner: www-data
#     group: www-data
#     mode: '0644'

- name: deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: restart nginx