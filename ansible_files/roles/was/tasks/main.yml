---
# 1. python 설치
- name: install python packages
  apt:
    name:
      - python3-venv
      - python3-pip
    state: present
    update_cache: yes

# 2. 디렉토리 생성
- name: create app directory
  file:
    path: "{{ fastapi_app_dir }}"
    state: directory
    owner: www-data
    group: www-data

# 3. 코드 배포
- name: copy app
  copy:
    src: main.py
    dest: "{{ fastapi_app_dir }}/main.py"
    owner: www-data
    group: www-data

# 4. venv + 패키지 설치
- name: install fastapi
  pip:
    name:
      - fastapi
      - uvicorn
      - gunicorn
      - pydantic
      - asyncpg  # PostgreSQL 연동용
    virtualenv: "{{ fastapi_app_dir }}/venv"
    virtualenv_command: python3 -m venv

# 5. 서비스 등록
- name: deploy service
  template:
    src: ../templates/fastapi.service.j2
    dest: /etc/systemd/system/fastapi.service